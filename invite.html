<!DOCTYPE html>
<html>
<head>
    <script>
        let appOpened = false;

        document.addEventListener("visibilitychange", function () {
            if (document.hidden) {
                appOpened = true;
            }
        });

        window.location.replace("https://ringly.in/feed");

        setTimeout(function () {
            if (!appOpened) {
                window.location.replace(
                    "https://play.google.com/store/apps/details?id=com.voxringly.app"
                );
            }
        }, 700);
    </script>
</head>
<body></body>
</html>
